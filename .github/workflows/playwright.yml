name: Playwright Tests

on:
  push:
    branches: [ main, master ]

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:

      environment:
        description: 'Select Environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - staging
          - production

      browser:
        description: 'Select Browser'
        required: true
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit

      testTag:
        description: 'Enter Test Tag'
        required: false
        default: '@smoke'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          npx playwright test --project=${{ github.event.inputs.browser }} --grep "${{ github.event.inputs.testTag }}"
        env:
          ENV: ${{ github.event.inputs.environment }}
          CI: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30